<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostKey | Encrypt File</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
font-family:Arial;
color:white;
overflow:hidden;
}

/* particle background */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:-1;
}

/* glass card */

.encrypt-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:400px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,255,0.3);
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

/* drag drop */

.drop-zone{
border:2px dashed #00eaff;
padding:30px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.drop-zone:hover{
background:rgba(0,255,255,0.08);
}

.file-name{
font-size:14px;
margin-top:10px;
color:#00ffa6;
}

/* button */

.btn-encrypt{
background:#00eaff;
border:none;
color:black;
font-weight:bold;
transition:0.3s;
}

.btn-encrypt:hover{
transform:scale(1.05);
background:#00ffa6;
}

/* progress */

.progress{
height:8px;
margin-top:10px;
display:none;
}

/* encryption label */

.security{
margin-top:15px;
font-size:13px;
color:#00eaff;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="encrypt-card">

<h3>
<i class="fa-solid fa-lock"></i>
GhostKey File Encryption
</h3>

<p class="text-light">
Protect your files using AES-256 encryption
</p>

<form method="POST" enctype="multipart/form-data">

<div class="drop-zone" id="dropZone">

<i class="fa-solid fa-cloud-upload fa-2x"></i>

<p>Drag & Drop File or Click to Upload</p>

<input type="file" name="file" id="fileInput" hidden required>

<div class="file-name" id="fileName"></div>

</div>

<br>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Encryption Password"
required>

<br>

<button class="btn btn-encrypt w-100">

<i class="fa-solid fa-shield-halved"></i>
Encrypt Securely

</button>

<div class="progress">

<div class="progress-bar progress-bar-striped progress-bar-animated"
style="width:100%"></div>

</div>

</form>

<div class="security">

<i class="fa-solid fa-lock"></i>
AES-256 Encryption Enabled

</div>

<br>

<a href="/dashboard" class="text-info">

<i class="fa-solid fa-arrow-left"></i>
Back to Dashboard

</a>

</div>

<script>

/* drag drop */

const dropZone=document.getElementById("dropZone");
const fileInput=document.getElementById("fileInput");
const fileName=document.getElementById("fileName");

dropZone.addEventListener("click",()=>fileInput.click());

fileInput.addEventListener("change",()=>{
fileName.innerText="Selected File: "+fileInput.files[0].name;
});

/* particles background */

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
});

</script>

</body>
</html>
