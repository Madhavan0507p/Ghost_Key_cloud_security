
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostKey Secure Cloud Storage</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Particles -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow:hidden;
}

/* particle background */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:-1;
}

/* main card */

.home-card{
background:rgba(255,255,255,0.08);
border-radius:18px;
padding:50px;
text-align:center;
backdrop-filter:blur(15px);
box-shadow:0 0 25px rgba(0,255,255,0.3);
width:420px;
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

/* buttons */

.btn-secure{
background:#00eaff;
border:none;
color:black;
font-weight:bold;
transition:0.3s;
}

.btn-secure:hover{
transform:scale(1.08);
background:#00ffa6;
}

/* feature icons */

.features{
margin-top:25px;
font-size:14px;
}

.features i{
color:#00eaff;
margin-right:6px;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="home-card">

<h2>
<i class="fa-solid fa-shield-halved"></i>
GhostKey Secure Cloud
</h2>

<p class="mt-3">
AI-Powered Encrypted Cloud File Sharing Platform
</p>

<div class="mt-4">

<a href="/login" class="btn btn-secure me-2">
<i class="fa-solid fa-right-to-bracket"></i>
Login
</a>

<a href="/register" class="btn btn-outline-light">
<i class="fa-solid fa-user-plus"></i>
Register
</a>

</div>

<hr class="mt-4">

<div class="features">

<p>
<i class="fa-solid fa-lock"></i>
AES-256 File Encryption
</p>

<p>
<i class="fa-solid fa-key"></i>
OTP Secure File Downloads
</p>

<p>
<i class="fa-solid fa-robot"></i>
AI Security Monitoring
</p>

</div>

</div>

<script>

/* particle background */

particlesJS("particles-js",{
particles:{
number:{value:70},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
});

</script>

</body>
</html>
