<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostKey Secure Share Link</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow:hidden;
}

/* particle background */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:-1;
}

/* share card */

.share-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,255,0.3);
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

/* link box */

.link-box{
display:flex;
gap:10px;
margin-top:15px;
}

.link-box input{
flex:1;
background:rgba(255,255,255,0.1);
border:none;
color:white;
padding:10px;
border-radius:6px;
}

/* buttons */

.btn-copy{
background:#00eaff;
border:none;
color:black;
font-weight:bold;
}

.btn-copy:hover{
background:#00ffa6;
}

.btn-download{
background:#00eaff;
border:none;
color:black;
font-weight:bold;
margin-top:15px;
}

.btn-download:hover{
background:#00ffa6;
}

/* timer */

.timer{
margin-top:10px;
font-size:14px;
color:#00ffa6;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="share-card">

<h3>
<i class="fa-solid fa-link"></i>
Secure Share Link
</h3>

<p>
This secure download link will expire soon
</p>

<div class="link-box">

<input type="text" id="shareLink" value="{{link}}" readonly>

<button class="btn btn-copy" onclick="copyLink()">
<i class="fa-solid fa-copy"></i>
</button>

</div>

<a href="{{link}}" class="btn btn-download w-100">

<i class="fa-solid fa-download"></i>
Download File

</a>

<div class="timer">
Link expires in <span id="countdown">120</span> seconds
</div>

<br>

<a href="/dashboard" class="text-info">
<i class="fa-solid fa-arrow-left"></i>
Back to Dashboard
</a>

</div>

<script>

/* copy link */

function copyLink(){
let copyText=document.getElementById("shareLink");
copyText.select();
document.execCommand("copy");
alert("Secure link copied!");
}

/* countdown timer */

let time=120;
const countdown=document.getElementById("countdown");

setInterval(()=>{
if(time>0){
time--;
countdown.innerText=time;
}
},1000);

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:70},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
});

</script>

</body>
</html>
