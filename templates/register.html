
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostKey Secure Registration</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- particles -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow:hidden;
}

/* particle background */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:-1;
}

/* register card */

.register-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:380px;
box-shadow:0 0 25px rgba(0,255,255,0.3);
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

/* title */

.title{
text-align:center;
margin-bottom:25px;
}

/* inputs */

.form-control{
background:rgba(255,255,255,0.1);
border:none;
color:white;
}

.form-control::placeholder{
color:#ddd;
}

.input-group-text{
background:#00eaff;
border:none;
color:black;
}

/* button */

.btn-register{
background:#00eaff;
border:none;
color:black;
font-weight:bold;
transition:0.3s;
}

.btn-register:hover{
background:#00ffa6;
transform:scale(1.05);
}

/* password strength */

.strength{
font-size:13px;
margin-top:5px;
}

/* security label */

.security{
margin-top:15px;
font-size:13px;
text-align:center;
color:#00eaff;
}

.spinner{
display:none;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="register-card">

<h3 class="title">
<i class="fa-solid fa-user-plus"></i>
Create GhostKey Account
</h3>

<form method="POST" id="registerForm">

<div class="mb-3">

<label>Email</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-envelope"></i>
</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Create a password"
required>

</div>

<div class="strength" id="strength"></div>

</div>

<div class="mb-3">

<label>Mobile Number</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-phone"></i>
</span>

<input
type="tel"
name="phone"
class="form-control"
placeholder="Enter your mobile number"
required>

</div>

</div>

<button class="btn btn-register w-100">

<i class="fa-solid fa-user-check"></i>
Register

<span class="spinner spinner-border spinner-border-sm"></span>

</button>

</form>

<div class="security">

<i class="fa-solid fa-lock"></i>
Secure account creation with encrypted authentication

</div>

<br>

<p class="text-center">

Already have an account?

<a href="/login" class="text-info">Login</a>

</p>

</div>

<script>

/* password strength */

const password=document.getElementById("password");
const strength=document.getElementById("strength");

password.addEventListener("input",()=>{

let val=password.value;

if(val.length<6){
strength.innerText="Weak password";
strength.style.color="red";
}
else if(val.length<10){
strength.innerText="Medium strength password";
strength.style.color="orange";
}
else{
strength.innerText="Strong password";
strength.style.color="lightgreen";
}

});

/* loading spinner */

const form=document.getElementById("registerForm");
const spinner=document.querySelector(".spinner");

form.addEventListener("submit",()=>{
spinner.style.display="inline-block";
});

/* particle background */

particlesJS("particles-js",{
particles:{
number:{value:70},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
});

</script>

</body>
</html>
