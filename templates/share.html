<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostKey Secure File Share</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
overflow:hidden;
}

/* particle background */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:-1;
}

/* share card */

.share-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:420px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,255,0.3);
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(25px);}
to{opacity:1;}
}

/* drag-drop area */

.drop-zone{
border:2px dashed #00eaff;
padding:30px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.drop-zone:hover{
background:rgba(0,255,255,0.08);
}

.file-name{
margin-top:10px;
font-size:14px;
color:#00ffa6;
}

/* buttons */

.btn-share{
background:#00eaff;
border:none;
color:black;
font-weight:bold;
transition:0.3s;
}

.btn-share:hover{
background:#00ffa6;
transform:scale(1.05);
}

.btn-copy{
background:#00eaff;
border:none;
color:black;
margin-top:10px;
}

/* link box */

.link-box{
margin-top:15px;
}

.link-box input{
width:100%;
padding:10px;
background:rgba(255,255,255,0.1);
border:none;
color:white;
border-radius:6px;
}

/* timer */

.timer{
margin-top:10px;
font-size:14px;
color:#00ffa6;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="share-card">

<h3>
<i class="fa-solid fa-share-nodes"></i>
Secure File Sharing
</h3>

<p>
Generate a temporary secure download link
</p>

<form method="POST" enctype="multipart/form-data">

<div class="drop-zone" id="dropZone">

<i class="fa-solid fa-cloud-arrow-up fa-2x"></i>

<p>Drag & Drop File or Click to Upload</p>

<input type="file" name="file" id="fileInput" hidden required>

<div class="file-name" id="fileName"></div>

</div>

<br>

<button class="btn btn-share w-100">

<i class="fa-solid fa-link"></i>
Generate Secure Link

</button>

</form>

{% if link %}

<div class="link-box">

<input type="text" id="shareLink" value="{{link}}" readonly>

<button class="btn btn-copy w-100" onclick="copyLink()">

<i class="fa-solid fa-copy"></i>
Copy Secure Link

</button>

</div>

<div class="timer">

Link expires in <span id="countdown">120</span> seconds

</div>

{% endif %}

<br>

<a href="/dashboard" class="text-info">

<i class="fa-solid fa-arrow-left"></i>
Back to Dashboard

</a>

</div>

<script>

/* drag-drop upload */

const dropZone=document.getElementById("dropZone");
const fileInput=document.getElementById("fileInput");
const fileName=document.getElementById("fileName");

dropZone.addEventListener("click",()=>fileInput.click());

fileInput.addEventListener("change",()=>{
fileName.innerText="Selected File: "+fileInput.files[0].name;
});

/* copy link */

function copyLink(){
let copyText=document.getElementById("shareLink");
copyText.select();
document.execCommand("copy");
alert("Secure link copied!");
}

/* countdown */

let time=120;
const countdown=document.getElementById("countdown");

setInterval(()=>{
if(time>0){
time--;
countdown.innerText=time;
}
},1000);

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:70},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
});

</script>

</body>
</html>
